<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Technical Analysis</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        :root {
            --bg-0: #070a12;
            --bg-1: #0b1020;
            --bg-2: #111827;
            --accent: #3b82f6;
        }
        html, body { height: 100%; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: #e5e7eb;
            /* Layered radial + linear gradient — subtle, only noticeable in
               empty areas. Pure dark everywhere panels sit on top. */
            background:
                radial-gradient(1200px 600px at 85% -10%, rgba(59, 130, 246, 0.08), transparent 60%),
                radial-gradient(900px 500px at -10% 110%, rgba(16, 185, 129, 0.06), transparent 60%),
                linear-gradient(180deg, #070a12 0%, #0a0f1c 100%);
            background-attachment: fixed;
            font-feature-settings: 'cv11', 'ss01', 'ss03';
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        /* Tabular numerals everywhere a price/percentage shows up — keeps
           columns from jittering as digits change. */
        .font-mono, code, pre { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace; }
        /* Modern thin scrollbar */
        .scrollbar-thin::-webkit-scrollbar { width: 8px; height: 8px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-thin::-webkit-scrollbar-thumb {
            background: rgba(148, 163, 184, 0.18);
            border-radius: 999px;
            border: 2px solid transparent;
            background-clip: content-box;
        }
        .scrollbar-thin::-webkit-scrollbar-thumb:hover { background: rgba(148, 163, 184, 0.32); background-clip: content-box; border: 2px solid transparent; }
        * { scrollbar-color: rgba(148,163,184,0.25) transparent; scrollbar-width: thin; }
        .reasoning-text { white-space: pre-line; }

        /* Glass surfaces — apply via .surface utility */
        .surface {
            background: linear-gradient(180deg, rgba(17, 24, 39, 0.72) 0%, rgba(17, 24, 39, 0.55) 100%);
            backdrop-filter: saturate(140%) blur(10px);
            -webkit-backdrop-filter: saturate(140%) blur(10px);
            border: 1px solid rgba(148, 163, 184, 0.08);
        }
        .surface-soft {
            background: rgba(17, 24, 39, 0.55);
            backdrop-filter: saturate(140%) blur(8px);
            -webkit-backdrop-filter: saturate(140%) blur(8px);
            border: 1px solid rgba(148, 163, 184, 0.06);
        }

        /* Inputs + buttons — a global upgrade without touching app.js
           classes. Scoped to the dark palette Tailwind emits for us. */
        input, select, textarea { transition: border-color .15s ease, box-shadow .15s ease, background-color .15s ease; }
        input:focus, select:focus, textarea:focus { outline: none; box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.22); }
        button { transition: background-color .15s ease, color .15s ease, transform .08s ease, box-shadow .15s ease; }
        button:active:not(:disabled) { transform: translateY(0.5px); }

        /* Accent glow used by the active tab pill */
        .glow-blue { box-shadow: 0 6px 20px -8px rgba(59, 130, 246, 0.55), inset 0 1px 0 rgba(255,255,255,0.08); }

        /* Live indicator — softer pulse than the default animate-pulse opacity flash */
        @keyframes live-pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.55); } 70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); } }
        .live-dot { animation: live-pulse 2s ease-out infinite; }

        /* Headings — tighter tracking for display sizes */
        h1, h2, h3 { letter-spacing: -0.01em; }
    </style>
</head>
<body>
    <div id="root"></div>
    <!-- Cache-bust on every load so app.js edits show without manual hard-reload -->
    <script>
      const s = document.createElement('script');
      s.type = 'text/babel';
      s.setAttribute('data-presets', 'react');
      s.src = '/app.js?v=' + Date.now();
      document.body.appendChild(s);
    </script>
</body>
</html>
