<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Stock Technical Analysis</title>
    <!-- r42 fix #0.8: Content-Security-Policy restricts script/connect/style
         origins to a known allowlist. Note: Tailwind's CDN runtime requires
         'unsafe-inline' for the styles it injects; everything else is locked
         to specific origins. -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' https://unpkg.com https://cdn.tailwindcss.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdn.tailwindcss.com;
      font-src 'self' https://fonts.gstatic.com data:;
      img-src 'self' data: blob:;
      connect-src 'self' ws: wss: https: http:;
      object-src 'none';
      frame-ancestors 'none';
      base-uri 'self';
    ">
    <meta http-equiv="X-Content-Type-Options" content="nosniff" />
    <meta name="referrer" content="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
    <!-- Tailwind runtime — no SRI possible (script content is dynamic). -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- r42 fix #0.8: pinned versions + SRI hashes; supply-chain compromise
         on unpkg now triggers the browser to refuse the script. -->
    <script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"
            integrity="sha384-JZigAjwiaZtkUbA44CWkPaT3iBb/mU5pO6QOANp+OqHd4q+1+7MG1kzp2OOP9ZfP"
            crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react@18.2.0/umd/react.production.min.js"
            integrity="sha384-tMH8h3BGESGckSAVGZ82T9n90ztNXxvdwvdM6UoR56cYcf+0iGXBliJ29D+wZ/x8"
            crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18.2.0/umd/react-dom.production.min.js"
            integrity="sha384-bm7MnzvK++ykSwVJ2tynSE5TRdN+xL418osEVF2DE/L/gfWHj91J2Sphe582B1Bh"
            crossorigin="anonymous"></script>
    <script>
      // Apply saved theme BEFORE the first paint so there is no flash.
      (function () {
        try {
          var t = localStorage.getItem('theme') || 'dark';
          document.documentElement.setAttribute('data-theme', t);
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
        }
      })();
    </script>
    <style>
        /* ---- Theme tokens -----------------------------------------------
           Everything in the app references these custom properties via
           utility classes (app-bg, app-surface, app-text, etc.) defined
           further down. Swapping the `data-theme` attr on <html> flips
           the entire palette without touching any JS. */
        html[data-theme="dark"] {
            --bg-0: #070a12;
            --bg-1: #0b1020;
            --bg-2: #111827;
            --surface: rgba(17, 24, 39, 0.72);
            --surface-soft: rgba(17, 24, 39, 0.55);
            --surface-solid: #131a2b;
            --surface-border: rgba(148, 163, 184, 0.10);
            --surface-border-soft: rgba(148, 163, 184, 0.06);
            --text-primary: #e5e7eb;
            --text-secondary: #94a3b8;
            --text-muted: #64748b;
            --accent: #3b82f6;
            --accent-soft: rgba(59, 130, 246, 0.22);
            --accent-strong: #60a5fa;
            --success: #10b981;
            --success-soft: rgba(16, 185, 129, 0.15);
            --danger: #ef4444;
            --danger-soft: rgba(239, 68, 68, 0.15);
            --warn: #f59e0b;
            --warn-soft: rgba(245, 158, 11, 0.15);
            --chart-bg: #0f1419;
            --chart-grid: #1f2937;
            --chart-border: #374151;
            --chart-text: #d1d5db;
            --shadow-lg: 0 10px 30px -12px rgba(0, 0, 0, 0.55);
        }
        html[data-theme="light"] {
            --bg-0: #f6f8fb;
            --bg-1: #eef2f8;
            --bg-2: #e6ecf4;
            --surface: rgba(255, 255, 255, 0.92);
            --surface-soft: rgba(255, 255, 255, 0.75);
            --surface-solid: #ffffff;
            --surface-border: rgba(15, 23, 42, 0.12);
            --surface-border-soft: rgba(15, 23, 42, 0.06);
            --text-primary: #0f172a;     /* slate-900 */
            --text-secondary: #334155;   /* slate-700 */
            /* r42 Tier 3: bump muted from slate-500 (#64748b ≈ 3.8:1) to
               slate-600 (#475569 ≈ 5.2:1) for WCAG AA on body text. */
            --text-muted: #475569;       /* slate-600 */
            --accent: #2563eb;
            --accent-soft: rgba(37, 99, 235, 0.15);
            --accent-strong: #1d4ed8;
            --success: #047857;          /* emerald-700 */
            --success-soft: rgba(16, 185, 129, 0.12);
            --danger: #b91c1c;           /* red-700 */
            --danger-soft: rgba(239, 68, 68, 0.10);
            --warn: #b45309;             /* amber-700 */
            --warn-soft: rgba(245, 158, 11, 0.12);
            --chart-bg: #ffffff;
            --chart-grid: #e5e7eb;
            --chart-border: #cbd5e1;
            --chart-text: #1e293b;
            --shadow-lg: 0 10px 25px -8px rgba(15, 23, 42, 0.15);
        }
        html, body { height: 100%; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            color: var(--text-primary);
            background: var(--bg-0);
            background-attachment: fixed;
            font-feature-settings: 'cv11', 'ss01', 'ss03';
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
            transition: background-color .3s ease, color .3s ease;
        }
        html[data-theme="dark"] body {
            background:
                radial-gradient(1200px 600px at 85% -10%, rgba(59, 130, 246, 0.08), transparent 60%),
                radial-gradient(900px 500px at -10% 110%, rgba(16, 185, 129, 0.06), transparent 60%),
                linear-gradient(180deg, #070a12 0%, #0a0f1c 100%);
            background-attachment: fixed;
        }
        html[data-theme="light"] body {
            background:
                radial-gradient(1200px 600px at 85% -10%, rgba(37, 99, 235, 0.08), transparent 60%),
                radial-gradient(900px 500px at -10% 110%, rgba(5, 150, 105, 0.06), transparent 60%),
                linear-gradient(180deg, #f6f8fb 0%, #eef2f8 100%);
            background-attachment: fixed;
        }

        .font-mono, code, pre { font-family: 'JetBrains Mono', ui-monospace, SFMono-Regular, Menlo, monospace; }

        /* Scrollbars — thin, themed */
        .scrollbar-thin::-webkit-scrollbar { width: 8px; height: 8px; }
        .scrollbar-thin::-webkit-scrollbar-track { background: transparent; }
        .scrollbar-thin::-webkit-scrollbar-thumb {
            background: var(--surface-border);
            border-radius: 999px;
            border: 2px solid transparent;
            background-clip: content-box;
        }
        .scrollbar-thin::-webkit-scrollbar-thumb:hover {
            background: var(--text-muted);
            background-clip: content-box;
            border: 2px solid transparent;
        }
        * { scrollbar-color: var(--surface-border) transparent; scrollbar-width: thin; }
        .reasoning-text { white-space: pre-line; }

        /* Glass surfaces */
        .surface {
            background: var(--surface);
            backdrop-filter: saturate(140%) blur(12px);
            -webkit-backdrop-filter: saturate(140%) blur(12px);
            border: 1px solid var(--surface-border);
        }
        .surface-soft {
            background: var(--surface-soft);
            backdrop-filter: saturate(140%) blur(8px);
            -webkit-backdrop-filter: saturate(140%) blur(8px);
            border: 1px solid var(--surface-border-soft);
        }
        .surface-solid {
            background: var(--surface-solid);
            border: 1px solid var(--surface-border);
        }

        /* Theme-aware text utilities */
        .app-text-primary { color: var(--text-primary); }
        .app-text-secondary { color: var(--text-secondary); }
        .app-text-muted { color: var(--text-muted); }
        .app-border { border-color: var(--surface-border); }
        .app-border-soft { border-color: var(--surface-border-soft); }
        .app-accent { color: var(--accent-strong); }
        .app-bg-surface { background: var(--surface); }
        .app-bg-surface-solid { background: var(--surface-solid); }

        /* ---- Light-theme overrides for existing Tailwind gray palette ----
           The app uses Tailwind classes (bg-gray-900, text-gray-400, etc.)
           extensively. In light mode we map the most common ones to light
           equivalents so legacy markup Just Works without touching every
           file. These are scoped under [data-theme="light"] so dark mode
           is unaffected. */
        html[data-theme="light"] body { color: var(--text-primary); }

        /* Surface backgrounds */
        html[data-theme="light"] .bg-gray-900, html[data-theme="light"] .bg-gray-950 { background-color: var(--surface-solid) !important; }
        html[data-theme="light"] .bg-gray-800 { background-color: #f1f5f9 !important; }
        html[data-theme="light"] .bg-gray-800\/60, html[data-theme="light"] .bg-gray-800\/50, html[data-theme="light"] .bg-gray-950\/50, html[data-theme="light"] .bg-gray-950\/60 { background-color: #f8fafc !important; }
        html[data-theme="light"] .bg-gray-900\/60, html[data-theme="light"] .bg-gray-900\/80 { background-color: #ffffff !important; }
        html[data-theme="light"] .bg-gray-950\/30 { background-color: #f8fafc !important; }

        /* Borders — darker for light theme contrast */
        html[data-theme="light"] .border-gray-800, html[data-theme="light"] .border-gray-700,
        html[data-theme="light"] .border-gray-800\/50, html[data-theme="light"] .border-gray-800\/30,
        html[data-theme="light"] .border-gray-800\/60, html[data-theme="light"] .border-gray-900\/30 {
            border-color: var(--surface-border) !important;
        }
        html[data-theme="light"] .border-white\/5, html[data-theme="light"] .border-white\/10 { border-color: var(--surface-border) !important; }

        /* Text */
        html[data-theme="light"] .text-white { color: var(--text-primary) !important; }
        html[data-theme="light"] .text-gray-100, html[data-theme="light"] .text-gray-200, html[data-theme="light"] .text-gray-300 { color: var(--text-primary) !important; }
        html[data-theme="light"] .text-gray-400 { color: var(--text-secondary) !important; }
        html[data-theme="light"] .text-gray-500, html[data-theme="light"] .text-gray-600 { color: var(--text-muted) !important; }

        /* r53n: SafetyBanner contrast fix. The banner uses `text-red-200`
           / `text-amber-200` which are pale pinks/yellows — readable on
           dark mode, near-invisible on light mode (light tint over light
           tint). Force dark high-contrast text for the banner in light
           mode so the operator can actually read the freeze/crisis
           message without selecting it. Scoped to .safety-banner so
           we don't affect other places that use those classes. */
        html[data-theme="light"] .safety-banner.text-red-200,
        html[data-theme="light"] .safety-banner .text-red-200 { color: #991b1b !important; }
        html[data-theme="light"] .safety-banner.text-amber-200,
        html[data-theme="light"] .safety-banner .text-amber-200 { color: #92400e !important; }

        /* r53q: Scheduler-trigger button text contrast in light mode. Same
           failure mode as r53n — `text-purple-300/blue-300/emerald-300` are
           still pale on a light tint background (purple-500/20 over white
           = lavender wash). Force saturated mid-tones in light mode. */
        html[data-theme="light"] .sched-trigger-row .text-emerald-300 { color: #047857 !important; }  /* emerald-700 */
        html[data-theme="light"] .sched-trigger-row .text-blue-300 { color: #1d4ed8 !important; }    /* blue-700 */
        html[data-theme="light"] .sched-trigger-row .text-purple-300 { color: #7e22ce !important; }  /* purple-700 */

        /* Hover tints */
        html[data-theme="light"] .hover\:bg-white\/5:hover { background-color: rgba(15, 23, 42, 0.04) !important; }
        html[data-theme="light"] .hover\:bg-white\/10:hover { background-color: rgba(15, 23, 42, 0.07) !important; }
        html[data-theme="light"] .hover\:bg-gray-800\/50:hover, html[data-theme="light"] .hover\:bg-gray-800\/30:hover { background-color: #f1f5f9 !important; }
        html[data-theme="light"] .hover\:bg-gray-800:hover, html[data-theme="light"] .hover\:bg-gray-700:hover { background-color: #e2e8f0 !important; }

        /* ---- Semantic color panels (signal cards, alerts, badges) ----
           Dark mode uses deeply saturated translucent fills on a black
           background. Those same fills are near-invisible on white, so
           we remap them to pastel tints with meaningful borders. */

        /* Emerald / success */
        html[data-theme="light"] .bg-emerald-500\/10, html[data-theme="light"] .bg-emerald-500\/15,
        html[data-theme="light"] .bg-emerald-900\/30, html[data-theme="light"] .bg-emerald-900\/50,
        html[data-theme="light"] .bg-emerald-600\/30, html[data-theme="light"] .bg-emerald-700\/40 {
            background-color: #dcfce7 !important;    /* emerald-100 */
        }
        html[data-theme="light"] .bg-emerald-800 { background-color: #86efac !important; color: #064e3b !important; }
        html[data-theme="light"] .border-emerald-500\/20, html[data-theme="light"] .border-emerald-500\/30,
        html[data-theme="light"] .border-emerald-500\/40, html[data-theme="light"] .border-emerald-600\/50,
        html[data-theme="light"] .border-emerald-700, html[data-theme="light"] .border-emerald-800 {
            border-color: #6ee7b7 !important;        /* emerald-300 */
        }
        html[data-theme="light"] .text-emerald-200, html[data-theme="light"] .text-emerald-300,
        html[data-theme="light"] .text-emerald-400 {
            color: #047857 !important;               /* emerald-700 */
        }

        /* Red / danger */
        html[data-theme="light"] .bg-red-500\/10, html[data-theme="light"] .bg-red-500\/15,
        html[data-theme="light"] .bg-red-500\/20, html[data-theme="light"] .bg-red-500\/30,
        html[data-theme="light"] .bg-red-900\/30, html[data-theme="light"] .bg-red-900\/40,
        html[data-theme="light"] .bg-red-900\/50, html[data-theme="light"] .bg-red-900\/60,
        html[data-theme="light"] .bg-red-950\/20, html[data-theme="light"] .bg-red-950\/40,
        html[data-theme="light"] .bg-red-700\/40, html[data-theme="light"] .bg-red-800\/60 {
            background-color: #fee2e2 !important;    /* red-100 */
        }
        html[data-theme="light"] .bg-red-800 { background-color: #fca5a5 !important; color: #7f1d1d !important; }
        html[data-theme="light"] .border-red-500\/20, html[data-theme="light"] .border-red-500\/30,
        html[data-theme="light"] .border-red-500\/40, html[data-theme="light"] .border-red-600\/50,
        html[data-theme="light"] .border-red-700, html[data-theme="light"] .border-red-800,
        html[data-theme="light"] .border-red-900\/30 {
            border-color: #fca5a5 !important;        /* red-300 */
        }
        html[data-theme="light"] .text-red-200, html[data-theme="light"] .text-red-300,
        html[data-theme="light"] .text-red-400 {
            color: #b91c1c !important;               /* red-700 */
        }

        /* Amber / warning */
        html[data-theme="light"] .bg-amber-800\/50, html[data-theme="light"] .bg-amber-900\/40,
        html[data-theme="light"] .bg-amber-900\/50, html[data-theme="light"] .bg-amber-950\/20,
        html[data-theme="light"] .bg-amber-950\/40 {
            background-color: #fef3c7 !important;    /* amber-100 */
        }
        html[data-theme="light"] .border-amber-700, html[data-theme="light"] .border-amber-800 {
            border-color: #fcd34d !important;        /* amber-300 */
        }
        html[data-theme="light"] .text-amber-300, html[data-theme="light"] .text-amber-400,
        html[data-theme="light"] .text-yellow-300, html[data-theme="light"] .text-yellow-400 {
            color: #b45309 !important;               /* amber-700 */
        }
        html[data-theme="light"] .bg-yellow-950\/20 { background-color: #fef3c7 !important; }
        html[data-theme="light"] .border-yellow-800\/50 { border-color: #fcd34d !important; }

        /* Blue / accent */
        html[data-theme="light"] .bg-blue-500\/15, html[data-theme="light"] .bg-blue-500\/20,
        html[data-theme="light"] .bg-blue-700, html[data-theme="light"] .bg-blue-700\/40,
        html[data-theme="light"] .bg-blue-950\/20, html[data-theme="light"] .bg-blue-950\/30,
        html[data-theme="light"] .bg-blue-900\/50 {
            background-color: #dbeafe !important;    /* blue-100 */
        }
        html[data-theme="light"] .text-blue-200, html[data-theme="light"] .text-blue-300,
        html[data-theme="light"] .text-blue-400, html[data-theme="light"] .text-blue-100 {
            color: #1d4ed8 !important;               /* blue-700 */
        }
        html[data-theme="light"] .border-blue-500\/30, html[data-theme="light"] .border-blue-500\/50,
        html[data-theme="light"] .border-blue-700, html[data-theme="light"] .border-blue-800,
        html[data-theme="light"] .border-blue-900\/30 {
            border-color: #93c5fd !important;
        }

        /* Indigo (used for strategy/analysis badges) */
        html[data-theme="light"] .bg-indigo-700, html[data-theme="light"] .bg-indigo-900\/40,
        html[data-theme="light"] .bg-indigo-950\/30 {
            background-color: #e0e7ff !important;
        }
        html[data-theme="light"] .text-indigo-300, html[data-theme="light"] .text-indigo-400 {
            color: #4338ca !important;
        }
        html[data-theme="light"] .border-indigo-700, html[data-theme="light"] .border-indigo-800\/50 {
            border-color: #a5b4fc !important;
        }

        /* Purple / fuchsia (options panels) */
        html[data-theme="light"] .bg-purple-500\/20, html[data-theme="light"] .bg-purple-900\/50,
        html[data-theme="light"] .bg-purple-950\/20, html[data-theme="light"] .bg-purple-950\/40 {
            background-color: #f5d0fe !important;    /* fuchsia-100 */
        }
        html[data-theme="light"] .text-purple-300, html[data-theme="light"] .text-purple-400 {
            color: #7e22ce !important;
        }
        html[data-theme="light"] .border-purple-500\/20, html[data-theme="light"] .border-purple-900\/50 {
            border-color: #d8b4fe !important;
        }

        /* Pills - ensure pill variants stay readable on white */
        html[data-theme="light"] .pill {
            background: #f1f5f9;
            border-color: #cbd5e1;
            color: #334155;
        }
        html[data-theme="light"] .pill-success {
            background: #dcfce7;
            color: #047857;
            border-color: #6ee7b7;
        }
        html[data-theme="light"] .pill-danger {
            background: #fee2e2;
            color: #b91c1c;
            border-color: #fca5a5;
        }
        html[data-theme="light"] .pill-warn {
            background: #fef3c7;
            color: #b45309;
            border-color: #fcd34d;
        }

        /* stat-card in light theme gets a subtle shadow instead of relying on surface glow */
        html[data-theme="light"] .stat-card {
            background: #ffffff;
            border-color: var(--surface-border);
            box-shadow: 0 1px 3px 0 rgba(15, 23, 42, 0.04), 0 1px 2px -1px rgba(15, 23, 42, 0.04);
        }

        /* Chart reasoning panel uses bg-gray-950/50 natively — override */
        html[data-theme="light"] .reasoning-text {
            color: var(--text-primary);
        }

        /* Brand word-mark — gradient text that reads in both themes.
           Dark: white→light blue (on dark surface).
           Light: slate-900→blue-600 (on white surface). */
        .app-brand {
            background-image: linear-gradient(90deg, #ffffff 0%, #bfdbfe 100%);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            -webkit-text-fill-color: transparent;
        }
        html[data-theme="light"] .app-brand {
            background-image: linear-gradient(90deg, #0f172a 0%, #2563eb 100%);
        }

        /* Inputs */
        input, select, textarea {
            transition: border-color .15s ease, box-shadow .15s ease, background-color .15s ease;
            color: var(--text-primary);
        }
        input:focus, select:focus, textarea:focus { outline: none; box-shadow: 0 0 0 3px var(--accent-soft); }
        html[data-theme="light"] input, html[data-theme="light"] select, html[data-theme="light"] textarea {
            background-color: #ffffff;
            border-color: var(--surface-border);
        }
        button { transition: background-color .15s ease, color .15s ease, transform .08s ease, box-shadow .15s ease; }
        button:active:not(:disabled) { transform: translateY(0.5px); }

        /* Accent glow on active tabs */
        .glow-blue { box-shadow: 0 6px 20px -8px var(--accent-soft), inset 0 1px 0 rgba(255,255,255,0.08); }

        /* Live pulse indicator */
        @keyframes live-pulse { 0%, 100% { box-shadow: 0 0 0 0 rgba(16, 185, 129, 0.55); } 70% { box-shadow: 0 0 0 6px rgba(16, 185, 129, 0); } }
        .live-dot { animation: live-pulse 2s ease-out infinite; }

        /* Headings */
        h1, h2, h3 { letter-spacing: -0.01em; }

        /* Card hover lift */
        .lift { transition: transform .15s ease, box-shadow .15s ease; }
        .lift:hover { transform: translateY(-1px); box-shadow: var(--shadow-lg); }

        /* Stat card */
        .stat-card {
            background: var(--surface);
            backdrop-filter: saturate(140%) blur(10px);
            border: 1px solid var(--surface-border);
            border-radius: 14px;
            padding: 14px 16px;
            transition: transform .15s ease, box-shadow .15s ease;
        }
        .stat-card:hover { transform: translateY(-1px); box-shadow: var(--shadow-lg); }

        /* Pill */
        .pill {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 3px 10px;
            border-radius: 999px;
            font-size: 10.5px;
            font-weight: 700;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            border: 1px solid var(--surface-border);
            background: var(--surface-soft);
        }
        .pill-success { background: var(--success-soft); color: var(--success); border-color: var(--success); }
        .pill-danger { background: var(--danger-soft); color: var(--danger); border-color: var(--danger); }
        .pill-warn { background: var(--warn-soft); color: var(--warn); border-color: var(--warn); }

        /* Skeleton loader */
        @keyframes skel-shimmer { 0% { background-position: -400px 0; } 100% { background-position: 400px 0; } }
        .skel {
            background: linear-gradient(90deg, var(--surface-border) 0px, var(--surface-border-soft) 40px, var(--surface-border) 80px);
            background-size: 400px;
            animation: skel-shimmer 1.2s linear infinite;
            border-radius: 8px;
        }

        /* Theme toggle button */
        .theme-toggle {
            position: relative;
            display: inline-flex;
            align-items: center;
            width: 48px;
            height: 26px;
            border-radius: 999px;
            background: var(--surface-soft);
            border: 1px solid var(--surface-border);
            cursor: pointer;
            padding: 2px;
            transition: background .2s ease;
        }
        .theme-toggle::after {
            content: '';
            position: absolute;
            width: 20px;
            height: 20px;
            border-radius: 999px;
            background: var(--accent);
            top: 50%;
            left: 3px;
            transform: translateY(-50%);
            transition: left .2s ease, background .2s ease;
        }
        html[data-theme="light"] .theme-toggle::after { left: 25px; }

        /* r49: undoable-toast progress fill */
        @keyframes r49ToastProgress {
            from { width: 100%; }
            to { width: 0%; }
        }

        /* r49: density tokens. Compact mode reduces vertical rhythm + scales
           cards down for power users who want max info density. */
        html[data-density="compact"] .surface,
        html[data-density="compact"] .surface-soft { padding: 0.75rem !important; }
        html[data-density="compact"] .rounded-2xl { border-radius: 0.75rem; }
        html[data-density="compact"] h1, html[data-density="compact"] h2, html[data-density="compact"] h3 {
            line-height: 1.2;
        }
        html[data-density="compact"] [data-r49-card] { padding: 0.5rem 0.625rem !important; }
        html[data-density="compact"] [data-r49-stat] { padding: 0.5rem !important; }
        html[data-density="compact"] [data-r49-stat] [data-r49-stat-label] { font-size: 9px; }
        html[data-density="compact"] [data-r49-stat] [data-r49-stat-value] { font-size: 14px; }
        html[data-density="compact"] [data-r49-spacer] { gap: 0.5rem !important; margin-top: 0.5rem !important; margin-bottom: 0.5rem !important; }

        /* r49: focus ring for accessibility */
        :focus-visible {
            outline: 2px solid var(--accent-strong, #60a5fa);
            outline-offset: 2px;
            border-radius: 4px;
        }

        /* r49: skip-link */
        .r49-skip-link {
            position: absolute;
            top: -40px;
            left: 8px;
            background: var(--accent);
            color: white;
            padding: 8px 12px;
            border-radius: 4px;
            font-weight: 600;
            z-index: 100;
            transition: top 0.2s;
        }
        .r49-skip-link:focus { top: 8px; }

        /* r49: pulse / flash animation for "this just changed" */
        @keyframes r49Flash {
            0% { background-color: rgba(59, 130, 246, 0.45); }
            100% { background-color: transparent; }
        }
        .r49-flash { animation: r49Flash 1.2s ease-out; }
    </style>
</head>
<body>
    <div id="root"></div>
    <!-- r42 fix #1.27 / #0.8: ship pre-compiled, minified app.compiled.js
         (esbuild output of app.js, see frontend/build.js). Removed the
         Babel-standalone in-browser transpile path: it was 1MB+ of runtime
         that ran on every page load and required script-src 'unsafe-eval'.
         For local dev with edit-and-refresh: run `node build.js --watch`. -->
    <!-- Static script tag — CSP forbids inline scripts so we can't use a
         dynamic cache-bust wrapper. Cloud Run sends ETag + Last-Modified
         on app.compiled.js which is sufficient for browser cache
         invalidation; first-visit-after-deploy may need one hard refresh. -->
    <script src="/app.compiled.js"></script>
</body>
