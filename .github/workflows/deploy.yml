name: Deploy to Cloud Run

on:
  push:
    branches:
      - main

permissions:
  contents: read
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Setup Node.js (for frontend build)
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Python (for tests and linting)
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
        cache: 'pip'

    - name: Install Python Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install -r backend/requirements-dev.txt

    - name: Install Frontend Dependencies
      run: |
        if [ -d "frontend" ] && [ -f "frontend/package.json" ]; then
          cd frontend
          npm install || npm install esbuild
        fi

    - name: Check All Secrets
      run: |
        if [ -z "${{ secrets.WIF_PROVIDER }}" ]; then
          echo "::error::WIF_PROVIDER secret is missing or empty! Please add it to Settings > Secrets and variables > Actions > Repository secrets."
          exit 1
        fi
        if [ -z "${{ secrets.WIF_SERVICE_ACCOUNT }}" ]; then
          echo "::error::WIF_SERVICE_ACCOUNT secret is missing or empty! Please add it to Settings > Secrets and variables > Actions > Repository secrets."
          exit 1
        fi
        if [ -z "${{ secrets.APCA_API_KEY_ID }}" ]; then
          echo "::error::APCA_API_KEY_ID secret is missing or empty! Please add your Alpaca Key ID to Repository secrets."
          exit 1
        fi
        if [ -z "${{ secrets.APCA_API_SECRET_KEY }}" ]; then
          echo "::error::APCA_API_SECRET_KEY secret is missing or empty! Please add your Alpaca Secret Key to Repository secrets."
          exit 1
        fi
        if [ -z "${{ secrets.DATABASE_URL }}" ]; then
          echo "::error::DATABASE_URL secret is missing or empty! Please add your Postgres Database URL to Repository secrets."
          exit 1
        fi
        if [ -z "${{ secrets.GCP_PROJECT_ID }}" ]; then
          echo "::error::GCP_PROJECT_ID secret is missing or empty! Please add your Google Cloud Project ID to Repository secrets."
          exit 1
        fi

    - name: Authenticate to Google Cloud (Workload Identity Federation)
      uses: google-github-actions/auth@v2
      with:
        workload_identity_provider: '${{ secrets.WIF_PROVIDER }}'
        service_account: '${{ secrets.WIF_SERVICE_ACCOUNT }}'
        project_id: '${{ secrets.GCP_PROJECT_ID }}'

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2
      with:
        project_id: '${{ secrets.GCP_PROJECT_ID }}'

    - name: Inject Environment Variables
      run: |
        CORS_ORIGINS="${{ secrets.CORS_ALLOW_ORIGINS }}"
        if [ -z "$CORS_ORIGINS" ]; then
          CORS_ORIGINS="*"
        fi
        cat << EOF > backend/.env
        APCA_API_KEY_ID=${{ secrets.APCA_API_KEY_ID }}
        APCA_API_SECRET_KEY=${{ secrets.APCA_API_SECRET_KEY }}
        DATABASE_URL=${{ secrets.DATABASE_URL }}
        APP_API_KEY=${{ secrets.APP_API_KEY }}
        CORS_ALLOW_ORIGINS=$CORS_ORIGINS
        POLYGON_API_KEY=${{ secrets.POLYGON_API_KEY }}
        EOF

    - name: Run Deployment Scripts
      run: |
        bash deploy-all.sh us-central1

    - name: Notify on Failure
      if: failure()
      env:
        WEBHOOK_URL: ${{ secrets.NOTIFICATION_WEBHOOK_URL }}
      run: |
        if [ -n "$WEBHOOK_URL" ]; then
          curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\":\"🚨 *Deployment Failed!* Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"content\":\"🚨 **Deployment Failed!** Check logs: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" \
          "$WEBHOOK_URL"
        fi